<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px; background: var(--canvas); }
  .title { font: 600 11px/14px var(--font-sans); letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); margin-bottom: 22px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 120px; height: 72px; background: var(--surface-2); border: 1px solid var(--border-1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--fg-2); font: 500 11px/14px var(--font-mono); }
  .name { font: 500 12px/16px var(--font-sans); color: var(--fg-1); }
  .val  { font: 400 11px/14px var(--font-mono); color: var(--fg-3); text-align: center; }
</style></head>
<body>
  <div class="title">Elevation · dropdowns, popovers, modals</div>
  <div class="grid">
    <div class="tile">
      <div class="box">flat</div>
      <div class="name">flat</div><div class="val">hairline border</div>
    </div>
    <div class="tile">
      <div class="box" style="box-shadow: var(--shadow-1), var(--shadow-inset-highlight)">shadow-1</div>
      <div class="name">shadow-1</div><div class="val">dropdowns · tooltips</div>
    </div>
    <div class="tile">
      <div class="box" style="box-shadow: var(--shadow-2), var(--shadow-inset-highlight)">shadow-2</div>
      <div class="name">shadow-2</div><div class="val">popovers · floating toolbars</div>
    </div>
    <div class="tile">
      <div class="box" style="box-shadow: var(--shadow-3), var(--shadow-inset-highlight)">shadow-3</div>
      <div class="name">shadow-3</div><div class="val">modals · command palette</div>
    </div>
  </div>
</body></html>
