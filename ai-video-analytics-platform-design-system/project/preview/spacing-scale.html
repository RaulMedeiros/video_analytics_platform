<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .title { font: 600 11px/14px var(--font-sans); letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); margin-bottom: 14px; }
  .row-token { display: grid; grid-template-columns: 80px 1fr 120px; align-items: center; gap: 16px; padding: 6px 0; }
  .key { font: 500 12px/16px var(--font-mono); color: var(--fg-1); }
  .bar { height: 10px; background: var(--primary); border-radius: 2px; }
  .px { font: 400 11px/14px var(--font-mono); color: var(--fg-3); text-align: right; }
</style></head>
<body>
  <div class="title">Spacing · 8 px base grid</div>
  <div class="row-token"><div class="key">space-1</div><div class="bar" style="width: 2px"></div><div class="px">2 px</div></div>
  <div class="row-token"><div class="key">space-2</div><div class="bar" style="width: 4px"></div><div class="px">4 px</div></div>
  <div class="row-token"><div class="key">space-3</div><div class="bar" style="width: 8px"></div><div class="px">8 px</div></div>
  <div class="row-token"><div class="key">space-4</div><div class="bar" style="width: 12px"></div><div class="px">12 px</div></div>
  <div class="row-token"><div class="key">space-5</div><div class="bar" style="width: 16px"></div><div class="px">16 px</div></div>
  <div class="row-token"><div class="key">space-6</div><div class="bar" style="width: 20px"></div><div class="px">20 px</div></div>
  <div class="row-token"><div class="key">space-7</div><div class="bar" style="width: 24px"></div><div class="px">24 px</div></div>
  <div class="row-token"><div class="key">space-8</div><div class="bar" style="width: 32px"></div><div class="px">32 px</div></div>
  <div class="row-token"><div class="key">space-9</div><div class="bar" style="width: 40px"></div><div class="px">40 px</div></div>
  <div class="row-token"><div class="key">space-10</div><div class="bar" style="width: 48px"></div><div class="px">48 px</div></div>
  <div class="row-token"><div class="key">space-11</div><div class="bar" style="width: 64px"></div><div class="px">64 px</div></div>
</body></html>
