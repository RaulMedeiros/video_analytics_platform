<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 28px; }
  .title { font: 600 11px/14px var(--font-sans); letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 72px; height: 72px; background: var(--surface-2); border: 1px solid var(--border-2); }
  .name { font: 500 12px/16px var(--font-sans); color: var(--fg-1); }
  .val  { font: 400 11px/14px var(--font-mono); color: var(--fg-3); }
</style></head>
<body>
  <div class="title">Corner radii</div>
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius: 0"></div><div class="name">none</div><div class="val">0 · outlines</div></div>
    <div class="tile"><div class="box" style="border-radius: 4px"></div><div class="name">sm / 4</div><div class="val">chips · inputs</div></div>
    <div class="tile"><div class="box" style="border-radius: 8px"></div><div class="name">md / 8</div><div class="val">cards · dialogs</div></div>
    <div class="tile"><div class="box" style="border-radius: 12px"></div><div class="name">lg / 12</div><div class="val">app shell</div></div>
  </div>
</body></html>
