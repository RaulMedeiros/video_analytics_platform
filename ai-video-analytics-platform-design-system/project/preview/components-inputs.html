<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .lbl { font: 500 11px/14px var(--font-sans); letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); margin-bottom: 4px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .input {
    height: 36px; padding: 0 12px;
    background: var(--surface-2); border: 1px solid var(--border-2);
    border-radius: 4px; color: var(--fg-1);
    font: 400 13px/18px var(--font-sans); width: 100%; box-sizing: border-box;
    transition: border-color var(--dur-micro) var(--ease-out), background var(--dur-micro) var(--ease-out);
  }
  .input::placeholder { color: var(--fg-3); }
  .input:focus { outline: none; border-color: var(--primary); background: var(--surface-1); }
  .input.focused { border-color: var(--primary); background: var(--surface-1); box-shadow: 0 0 0 2px var(--focus-ring); }
  .input.error { border-color: var(--danger); }
  .help { font: 400 12px/16px var(--font-sans); color: var(--fg-3); }
  .help.err { color: var(--danger); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: ''; position: absolute; right: 10px; top: 50%;
    width: 8px; height: 8px; border-right: 1.5px solid var(--fg-2); border-bottom: 1.5px solid var(--fg-2);
    transform: translateY(-70%) rotate(45deg); pointer-events: none;
  }

  /* Search input with icon */
  .search { position: relative; }
  .search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--fg-3); }
  .search .input { padding-left: 34px; }
</style></head>
<body>
  <div class="row2">
    <div class="field">
      <div class="lbl">Stream name</div>
      <input class="input" value="Warehouse NE-04 · aisle cam"/>
      <div class="help">Internal label, visible only to your org.</div>
    </div>
    <div class="field">
      <div class="lbl">RTSP URL</div>
      <input class="input focused" value="rtsp://10.24.8.31:554/axis-media/media.amp" style="font-family: var(--font-mono); font-size: 12px"/>
      <div class="help">Focused state · primary-ring outline.</div>
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <div class="lbl">Region</div>
      <div class="select-wrap">
        <select class="input" style="appearance: none; padding-right: 28px;">
          <option>us-east-1 · Virginia</option>
          <option>eu-west-1 · Ireland</option>
        </select>
      </div>
    </div>
    <div class="field">
      <div class="lbl">Inference model</div>
      <input class="input error" value=""/>
      <div class="help err">Select a model before saving.</div>
    </div>
  </div>

  <div class="field">
    <div class="lbl">Search</div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="input" placeholder="Search 1,247 streams, alerts, incidents…"/>
    </div>
  </div>
</body></html>
